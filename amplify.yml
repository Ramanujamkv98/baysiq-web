version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - rm -f .env.production
        - 'test -n "$OPENAI_API_KEY" || (echo "OPENAI_API_KEY_EMPTY_IN_BUILD_ENV" && exit 1)'
        - 'echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production'
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
