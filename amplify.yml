version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - rm -f .env.production
        # Fail fast if Amplify didn't provide the value at build time
        - test -n "$OPENAI_API_KEY" || (echo "ERROR: OPENAI_API_KEY is empty in Amplify build env" && exit 1)
        - echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> .env.production
        - npm run build
        # Include .env.production in artifact so runtime can load it (Next reads at server start)
        - cp .env.production .next/.env.production
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
